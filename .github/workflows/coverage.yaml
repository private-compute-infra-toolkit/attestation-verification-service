name: 'Coverage'
permissions:
  contents: 'read'

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  coverage:
    runs-on: 'ubuntu-latest-8-cores'
    timeout-minutes: 60

    steps:
      - uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Set git identity'
        uses: './.devkit/.github/actions/set-git-identity'

      - name: 'Run coverage'
        run: |
          devkit/coverage --lines 25

      - name: 'Upload devkit logs'
        if: 'always()'
        uses: './.devkit/.github/actions/upload-devkit-logs'

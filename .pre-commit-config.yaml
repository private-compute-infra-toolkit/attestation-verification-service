exclude: (?x)^(
  bazel-(bin|out|testlogs|workspace)/.*|
  licenses/.* |
  third_party/.* |
  \.?devkit/.*|
  .*\.patch|
  \.vscode/.*|
  version\.txt|
  CHANGELOG\.md|
  ^avs_server/testdata/.*crt|
  ^resources/pcit_root_certs/.*
  )$
fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-symlinks
      - id: check-added-large-files
      - id: check-vcs-permalinks
      - id: check-executables-have-shebangs
      - id: detect-private-key
        # A pair of keys (public and private) are embedded in the unit test.
        # The key is used to generate and sign a CSR; where the public key
        # is bound to the test evidence collected from SEV SNP machines in prod.
        exclude: ^avs_server/tests/avs_server_lib_test.rs$

  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: require-ascii
      - id: shellcheck

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.4
    hooks:
      - id: clang-format
        types_or:
          - c++
          - c

  - repo: https://github.com/bufbuild/buf
    rev: v1.60.0
    hooks:
      - id: buf-format
        entry: buf format --write

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier markdown, json, yaml
        types_or:
          - markdown
          - json
          - yaml
        exclude: (?x)(
          .*-lock|
          .*/testing/.*\.reply|
          )\.(json|yaml)|
          \.pre-commit-config.yaml|
          .*\.clang-(format|tidy)$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: gitlinks
        name: Check gitlinks
        language: script
        entry: devkit/gitlinks --check
        always_run: true
        pass_filenames: false
      - id: docker-rustfmt
        name: rustfmt (docker)
        language: docker_image
        require_serial: true
        verbose: true
        entry: rustlang/rust:nightly-slim bash -c 'rustup component add rustfmt 2> /dev/null && rustfmt --unstable-features "$@"' --
        types: [rust]

      - id: buildifier
        name: buildifier
        description: Format bazel WORKSPACE, BUILD and .bzl files with a standard convention.
        language: golang
        additional_dependencies:
          - github.com/bazelbuild/buildtools/buildifier@6.1.1
        always_run: true
        pass_filenames: true
        types_or:
          - bazel
        entry: buildifier
        args:
          - -lint=fix
          - -mode=fix
          - -warnings=all

      - id: txtpbfmt
        name: txtpbfmt
        language: golang
        additional_dependencies:
          - github.com/protocolbuffers/txtpbfmt/cmd/txtpbfmt@latest
        always_run: false
        pass_filenames: true
        entry: txtpbfmt
        files: \.textproto$

      - id: addlicense
        name: addlicense
        language: golang
        additional_dependencies:
          - github.com/google/addlicense@v1.1.1
        always_run: false
        pass_filenames: true
        entry: addlicense -v
        types_or:
          - text

      - id: addlicense-check
        name: addlicense check
        language: golang
        additional_dependencies:
          - github.com/google/addlicense@v1.1.1
        always_run: false
        pass_filenames: true
        entry: addlicense -check
        types_or:
          - text

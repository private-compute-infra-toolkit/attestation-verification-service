exclude: (?x)^(
  bazel-(bin|out|testlogs|workspace)/.*|
  \.?devkit/.*|
  .*\.patch|
  \.vscode/.*|
  version\.txt|
  CHANGELOG\.md
  )$
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
      - id: check-symlinks
      - id: check-vcs-permalinks
      - id: check-executables-have-shebangs
      - id: detect-private-key

  - repo: local
    hooks:
      - id: gitlinks
        name: Check gitlinks
        language: script
        entry: devkit/gitlinks --check
        always_run: true
        pass_filenames: false
      - id: addlicense
        name: addlicense
        language: golang
        additional_dependencies:
          - github.com/google/addlicense@v1.1.1
        always_run: false
        pass_filenames: true
        entry: addlicense -v
        types_or:
          - text

      - id: addlicense-check
        name: addlicense check
        language: golang
        additional_dependencies:
          - github.com/google/addlicense@v1.1.1
        always_run: false
        pass_filenames: true
        entry: addlicense -check
        types_or:
          - text

      - id: buildifier
        name: buildifier
        description: Format bazel WORKSPACE, BUILD and .bzl files with a standard convention.
        language: golang
        additional_dependencies:
          - github.com/bazelbuild/buildtools/buildifier@6.1.1
        always_run: true
        pass_filenames: true
        types_or:
          - bazel
        entry: buildifier
        args:
          - -lint=fix
          - -mode=fix
          - -warnings=all

      - id: docker-rustfmt
        name: rustfmt (docker)
        language: docker_image
        require_serial: true
        verbose: true
        entry: rust:1.93.0-slim-bookworm bash -c 'rustup component add rustfmt 2>/dev/null && rustfmt "$@"' --
        types: [rust]
        args: ["--edition", "2021"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: |
          (?x)^(
            Cargo_no_std_no_avx.bazel.lock|
            Cargo_no_std.bazel.lock|
            cargo-bazel-lock.json|
            cargo-no-std-bazel-lock.json|
            cargo-no-std-no-avx-bazel-lock.json|
            Cargo.bazel.lock|
            MODULE.bazel.lock
          )$

  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: require-ascii
      - id: shellcheck

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.4
    hooks:
      - id: clang-format
        types_or:
          - c++
          - c

  - repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
    rev: v2.15.0
    hooks:
      - id: pretty-format-java
        name: Google Java Formatter
        # Specify version of the google java formatter
        # https://github.com/google/google-java-format/releases/
        args: [--autofix, --google-java-formatter-version=1.29.0]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: prettier markdown, json, yaml
        types_or:
          - markdown
          - json
          - yaml
        exclude: |
          (?x)^(
            .*\.clang-tidy|
            cargo-bazel-lock.json|
            cargo-no-std-bazel-lock.json|
            cargo-no-std-no-avx-bazel-lock.json|
            MODULE.bazel.lock
          )$

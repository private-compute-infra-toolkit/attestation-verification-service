[package]
name = "tca-common"
version = "0.1.0"
edition = "2021"

[dependencies]
thiserror = "1.0"
prost = "0.14"
prost-types = "0.14"
async-trait = "0.1"
tokio = { version = "1.0", features = ["full"] }
x509-parser = "0.15"
tonic = "0.14"
rsa = { version = "0.9", features = ["sha2"] }
rand = "0.8"
x509-cert = { version = "0.2", features = ["builder"] }
protoc-gen-prost = "0.5"
protoc-gen-tonic = "0.5"
p256 = "0.13"
